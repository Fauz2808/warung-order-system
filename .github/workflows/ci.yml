name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  # ── Frontend build check ──────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build Next.js
        run: cd frontend && npm run build
        env:
          # Dummy values supaya build tidak error karena env vars kosong
          NEXT_PUBLIC_API_URL: https://warung-order-system-production.up.railway.app
          NEXT_PUBLIC_SOCKET_URL: https://warung-order-system-production.up.railway.app
          NEXT_PUBLIC_APP_URL: https://carracoffee.my.id

  # ── Backend syntax check ──────────────────────────────
  backend-check:
    name: Backend Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: cd backend && npm ci

      - name: Check syntax semua route files
        run: |
          for f in backend/src/routes/*.js backend/src/middleware/*.js backend/index.js; do
            node --check "$f" && echo "✓ $f"
          done
